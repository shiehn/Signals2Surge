name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Run ruff
        run: uv run --extra dev ruff check src/ tests/

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Run unit tests with coverage
        run: >
          uv run --extra dev pytest tests/unit/
          -v
          --tb=short
          --cov=synth2surge
          --cov-report=term-missing
          --cov-fail-under=60

  integration:
    name: Integration Tests (Surge XT)
    runs-on: macos-latest
    # Integration tests require Surge XT installed, which is only
    # available on macOS runners with manual setup. These tests
    # auto-skip gracefully if Surge XT is not found.
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Run all tests (integration tests skip if Surge XT not installed)
        run: >
          uv run --extra dev pytest tests/
          -v
          --tb=short
          -m "not slow"
